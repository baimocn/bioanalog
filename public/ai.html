<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 学术助手 — 默存</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;
  background:#06080e;color:#e2e8f0;line-height:1.6;
}

/* ---- 噪点纹理 ---- */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
  opacity:.02;
}

/* ---- Canvas 背景 ---- */
#ai-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ============================================================
   整体布局：左侧信息栏 + 右侧聊天区
   ============================================================ */
.ai-layout{
  position:relative;z-index:1;
  display:flex;height:100vh;
}

/* ---- 左侧信息面板（桌面可见） ---- */
.ai-sidebar{
  width:280px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-right:1px solid rgba(255,255,255,.04);
  padding:24px 20px;
}
.ai-sidebar .back-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:20px;width:fit-content;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
  color:#94a3b8;font-size:13px;text-decoration:none;transition:.2s;
  margin-bottom:28px;
}
.ai-sidebar .back-link:hover{
  background:rgba(255,255,255,.1);color:#e2e8f0;text-decoration:none;
}

/* AI 人物卡片 */
.persona-card{
  text-align:center;padding:24px 16px;
  background:rgba(30,41,59,.4);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;margin-bottom:24px;
}
.persona-avatar{
  width:72px;height:72px;border-radius:50%;margin:0 auto 14px;
  background:linear-gradient(135deg,#a78bfa,#38bdf8);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  box-shadow:0 0 24px rgba(167,139,250,.2);
  position:relative;
}
.persona-avatar .status{
  position:absolute;bottom:2px;right:2px;
  width:14px;height:14px;border-radius:50%;
  background:#4ade80;border:3px solid #06080e;
  animation:statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.3)}
  50%{box-shadow:0 0 0 4px rgba(74,222,128,0)}
}
.persona-card h2{font-size:18px;font-weight:700;margin-bottom:4px}
.persona-card .role{font-size:12px;color:#94a3b8;margin-bottom:12px}
.persona-card .status-text{font-size:12px;color:#4ade80;display:flex;align-items:center;justify-content:center;gap:5px}
.persona-card .status-text::before{
  content:'';width:6px;height:6px;border-radius:50%;background:#4ade80;
}

/* 侧边栏信息区 */
.sidebar-info{flex:1}
.sidebar-info h3{
  font-size:11px;text-transform:uppercase;letter-spacing:.12em;
  color:#64748b;margin-bottom:12px;
}
.info-item{
  padding:10px 12px;border-radius:10px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.03);
  margin-bottom:8px;font-size:12px;color:#94a3b8;
  transition:.2s;cursor:default;
}
.info-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.06)}
.info-item strong{color:#e2e8f0;font-weight:600}

/* 底部年份 */
.sidebar-footer{
  margin-top:auto;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.04);
  font-size:11px;color:rgba(255,255,255,.15);text-align:center;
}

/* ============================================================
   右侧聊天区
   ============================================================ */
.ai-chat{
  flex:1;display:flex;flex-direction:column;
  min-width:0;
}

/* ---- 聊天顶栏 ---- */
.chat-top{
  padding:14px 24px;
  background:rgba(15,23,42,.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.chat-top .mobile-back{
  display:none; /* 桌面隐藏，移动端显示 */
  padding:6px 12px;border-radius:16px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);
  color:#94a3b8;font-size:12px;text-decoration:none;
}
.chat-top .title{font-size:15px;font-weight:600}
.chat-top .subtitle{font-size:12px;color:#64748b}

/* ---- 消息区域 ---- */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:24px clamp(16px,3vw,32px);
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}

/* ---- 消息组（状态行 + 气泡） ---- */
.msg-group{
  align-self:flex-start;
  max-width:78%;
  opacity:0;transform:translateY(12px);
  animation:msgIn .4s ease forwards;
}
.msg-status-row{
  overflow:hidden;
  transition:max-height .3s ease,opacity .25s ease;
}
.msg-status-row[style*="display:none"]{
  max-height:0;opacity:0;
}

/* ---- 消息气泡 ---- */
.msg{
  display:flex;gap:10px;
  max-width:78%;
  opacity:0;transform:translateY(12px);
  animation:msgIn .4s ease forwards;
}
@keyframes msgIn{
  to{opacity:1;transform:none}
}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.msg.system{align-self:center;max-width:85%}

/* 消息头像 */
.msg .msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,#a78bfa,#38bdf8)}
.msg.user .msg-avatar{background:linear-gradient(135deg,#38bdf8,#22d3ee)}

/* 气泡本体 */
.msg .bubble{
  padding:12px 16px;border-radius:16px;
  font-size:14px;line-height:1.7;word-break:break-word;
  position:relative;
}
.msg.assistant .bubble{
  background:rgba(30,41,59,.6);
  border:1px solid rgba(255,255,255,.05);
  border-bottom-left-radius:4px;
}
.msg.user .bubble{
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;
  border-bottom-right-radius:4px;
}
.msg.system .bubble{
  background:rgba(251,146,60,.08);
  border:1px solid rgba(251,146,60,.15);
  color:#fb923c;font-size:12px;text-align:center;
  border-radius:10px;
}

/* ---- 打字指示器 ---- */
.typing-dots{
  display:flex;gap:4px;padding:4px 0;
}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:#64748b;
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{
  0%,80%,100%{transform:translateY(0);opacity:.4}
  40%{transform:translateY(-5px);opacity:1}
}

/* ---- AI 状态行（独立于气泡，不重叠） ---- */
.msg-status-row{
  display:flex;align-items:center;gap:8px;
  padding:0 0 4px 42px;
  animation:statusRowIn .35s ease;
}
@keyframes statusRowIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}
.msg-status{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:500;letter-spacing:.02em;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid transparent;
  transition:all .3s ease;
}
.msg-status.status-thinking{
  background:rgba(167,139,250,.1);
  border-color:rgba(167,139,250,.2);
  color:#c4b5fd;
  box-shadow:0 0 12px rgba(167,139,250,.08);
}
.msg-status.status-generating{
  background:rgba(56,189,248,.08);
  border-color:rgba(56,189,248,.15);
  color:#7dd3fc;
  box-shadow:0 0 12px rgba(56,189,248,.06);
}
.msg-status.status-skill{
  background:rgba(74,222,128,.08);
  border-color:rgba(74,222,128,.15);
  color:#86efac;
  box-shadow:0 0 12px rgba(74,222,128,.06);
}

/* 状态图标容器 */
.status-dot{
  position:relative;width:16px;height:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}

/* 思考中：三个脉冲点 */
.status-thinking .status-dot::before,
.status-thinking .status-dot::after,
.status-thinking .status-dot span{
  content:'';position:absolute;
  width:4px;height:4px;border-radius:50%;
  background:#c4b5fd;
  animation:dotPulse 1.4s ease-in-out infinite;
}
.status-thinking .status-dot::before{left:0;animation-delay:0s}
.status-thinking .status-dot span{left:6px;animation-delay:.2s}
.status-thinking .status-dot::after{left:12px;animation-delay:.4s}
@keyframes dotPulse{
  0%,60%,100%{opacity:.25;transform:scale(.7)}
  30%{opacity:1;transform:scale(1)}
}

/* 生成中：旋转弧线 */
.status-generating .status-dot::before{
  content:'';position:absolute;
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(125,211,252,.15);
  border-top-color:#7dd3fc;
  animation:spinRing .8s linear infinite;
}
@keyframes spinRing{
  to{transform:rotate(360deg)}
}

/* 技能引用：跳动链接符 */
.status-skill .status-dot::before{
  content:'🔗';font-size:10px;
  animation:skillBounce .6s ease infinite alternate;
}
@keyframes skillBounce{
  from{transform:translateY(0)}
  to{transform:translateY(-2px)}
}

/* 状态文字渐变 shimmer */
.msg-status .status-label{
  position:relative;overflow:hidden;
}
.msg-status.status-thinking .status-label::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(196,181,253,.3) 50%,transparent 100%);
  animation:shimmer 2s ease-in-out infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* ---- 动态头像光环 ---- */
.msg .msg-avatar{
  position:relative;z-index:1;
}
.msg-avatar::before{
  content:'';position:absolute;inset:-3px;
  border-radius:50%;border:2px solid transparent;
  transition:all .4s ease;pointer-events:none;
}
.msg-avatar.state-idle::before{
  border-color:rgba(167,139,250,.1);
  animation:idleRing 3s ease-in-out infinite;
}
@keyframes idleRing{
  0%,100%{border-color:rgba(167,139,250,.08);transform:scale(1)}
  50%{border-color:rgba(56,189,248,.12);transform:scale(1.04)}
}
.msg-avatar.state-thinking::before{
  border-color:rgba(167,139,250,.3);
  border-top-color:#a78bfa;
  animation:thinkRing 1s linear infinite;
  box-shadow:0 0 10px rgba(167,139,250,.15);
}
@keyframes thinkRing{
  to{transform:rotate(360deg)}
}
.msg-avatar.state-generating::before{
  border-color:rgba(56,189,248,.25);
  animation:genRing 1.6s ease-in-out infinite;
  box-shadow:0 0 12px rgba(56,189,248,.12);
}
@keyframes genRing{
  0%,100%{transform:scale(1);border-color:rgba(56,189,248,.15)}
  50%{transform:scale(1.08);border-color:rgba(56,189,248,.35)}
}
.msg-avatar .avatar-icon{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;transition:transform .3s ease;
}

/* ============================================================
   快捷问题 + 输入区域
   ============================================================ */
.chat-input-area{
  padding:12px clamp(16px,3vw,32px) 16px;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.04);
  flex-shrink:0;
}

/* 快捷问题按钮 */
.quick-questions{
  display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;
}
.quick-btn{
  padding:6px 14px;border-radius:20px;cursor:pointer;
  background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.12);
  color:#38bdf8;font-size:12px;font-family:inherit;
  transition:.2s;white-space:nowrap;
}
.quick-btn:hover{
  background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.2);
  transform:translateY(-1px);
}

/* 输入行 */
.input-row{
  display:flex;gap:10px;
}
.input-row input{
  flex:1;
  background:rgba(30,41,59,.5);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:12px 16px;
  color:#e2e8f0;font-size:14px;font-family:inherit;
  outline:none;transition:.2s;
}
.input-row input:focus{border-color:rgba(56,189,248,.4);background:rgba(30,41,59,.7)}
.input-row input::placeholder{color:#475569}
.input-row button{
  padding:12px 24px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff;font-size:14px;font-weight:600;font-family:inherit;
  transition:.2s;white-space:nowrap;
}
.input-row button:hover{opacity:.9;transform:translateY(-1px)}
.input-row button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ---- 页脚（移动端显示） ---- */
.chat-footer{
  display:none; /* 桌面由侧边栏承载，移动端显示 */
  padding:10px;text-align:center;
  font-size:11px;color:#475569;
  background:rgba(15,23,42,.6);
  border-top:1px solid rgba(255,255,255,.03);
}

/* ============================================================
   消息区域滚动条美化
   ============================================================ */
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.08);border-radius:3px;
}
.chat-messages::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.14)}

/* ============================================================
   响应式 — 移动端：隐藏侧边栏，顶栏显示返回按钮
   ============================================================ */
@media(max-width:768px){
  .ai-sidebar{display:none}
  .chat-top .mobile-back{display:inline-flex}
  .msg{max-width:90%}
  .msg-group{max-width:90%}
  .msg-status-row{padding-left:40px}
  .quick-questions{gap:6px}
  .quick-btn{font-size:11px;padding:5px 11px}
  .chat-footer{display:block}
}
</style>
</head>

<div class="ai-layout">

<script>
/* ============================================================
   Canvas 粒子背景 — 与 modules.html 呼应的深空感
   ============================================================ */
(function(){
  var cv=document.getElementById('ai-bg');
  var c=cv.getContext('2d');
  var W,H,pts=[];
  var DPR=Math.min(window.devicePixelRatio||1,2);
  var N=50,DIST=120;

  function resize(){
    W=innerWidth;H=innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;
    c.setTransform(DPR,0,0,DPR,0,0);
  }
  function init(){
    pts=[];
    for(var i=0;i<N;i++) pts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*1.3+.4,o:Math.random()*.3+.15
    });
  }
  function draw(){
    c.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      p.x=Math.max(0,Math.min(W,p.x));
      p.y=Math.max(0,Math.min(H,p.y));
    }
    c.lineWidth=.35;
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var a=pts[i],b=pts[j];
        var dx=a.x-b.x,dy=a.y-b.y;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          c.strokeStyle='rgba(99,102,241,'+((1-d/DIST)*.06)+')';
          c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();
        }
      }
    }
    for(var i=0;i<pts.length;i++){
      c.beginPath();c.arc(pts[i].x,pts[i].y,pts[i].r,0,Math.PI*2);
      c.fillStyle='rgba(140,160,230,'+pts[i].o+')';c.fill();
    }
    requestAnimationFrame(draw);
  }
  resize();init();draw();
  window.addEventListener('resize',function(){resize();init()});
})();

/* ============================================================
   聊天功能 — 流式输出 + 对话历史 + 状态指示
   ============================================================ */
(function(){
  var msgsEl=document.getElementById('chat-msgs');
  var inputEl=document.getElementById('ai-input');
  var sendBtn=document.getElementById('ai-send');
  var clearBtn=document.getElementById('clear-history-btn');
  var conversationHistory=[];
  var currentStreamCtrl=null;
  var MAX_HISTORY=20;

  // 配置 marked
  if(typeof marked!=='undefined'){
    marked.setOptions({mangle:false,headerIds:false});
  }

  // 渲染 Markdown 文本到元素
  function renderMarkdown(el,text){
    if(typeof marked!=='undefined'){
      el.innerHTML=marked.parse(text);
      el.querySelectorAll('a').forEach(function(a){
        a.target='_blank';a.rel='noopener noreferrer';
      });
    }else{
      el.textContent=text;
    }
  }

  // 设置消息状态
  function setMsgStatus(wrapper,state,label){
    var row=wrapper.querySelector('.msg-status-row');
    var badge=wrapper.querySelector('.msg-status');
    var avatar=wrapper.querySelector('.msg-avatar');
    if(!badge||!row)return;
    if(!state){
      row.style.display='none';
      if(avatar){avatar.className='msg-avatar';}
      return;
    }
    badge.className='msg-status status-'+state;
    badge.innerHTML='<span class="status-dot"><span></span></span><span class="status-label">'+label+'</span>';
    row.style.display='flex';
    if(avatar){
      avatar.className='msg-avatar state-'+state;
    }
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  // 创建带状态的 AI 消息占位符
  function addStreamingMsg(){
    var group=document.createElement('div');
    group.className='msg-group';
    group.innerHTML=
      '<div class="msg-status-row" style="display:flex">'+
        '<div class="msg-status status-thinking">'+
          '<span class="status-dot"><span></span></span>'+
          '<span class="status-label">思考中</span>'+
        '</div>'+
      '</div>'+
      '<div class="msg assistant">'+
        '<div class="msg-avatar state-thinking"><span class="avatar-icon">🧬</span></div>'+
        '<div class="bubble"></div>'+
      '</div>';
    msgsEl.appendChild(group);
    msgsEl.scrollTop=msgsEl.scrollHeight;
    return group;
  }

  // 添加普通消息
  function addMsg(role,text){
    var wrapper=document.createElement('div');
    wrapper.className='msg '+role;
    var html='';
    if(role==='assistant'){
      html='<div class="msg-avatar state-idle"><span class="avatar-icon">🧬</span></div><div class="bubble"></div>';
    }else if(role==='user'){
      html='<div class="msg-avatar"><span class="avatar-icon">👤</span></div><div class="bubble"></div>';
    }else{
      html='<div class="bubble"></div>';
    }
    wrapper.innerHTML=html;
    var bubble=wrapper.querySelector('.bubble');
    if(role==='assistant'){
      renderMarkdown(bubble,text);
    }else{
      bubble.textContent=text;
    }
    msgsEl.appendChild(wrapper);
    msgsEl.scrollTop=msgsEl.scrollHeight;
    return bubble;
  }

  // 欢迎消息
  addMsg('assistant','你好，我是默存。名字取自"默而存之"——我沉在数据与生命的深处，不喧哗，只回应。\n\n你可以点击下方快捷问题，或直接输入任何科学问题，我会认真对待。');
  addMsg('system','提示：AI 回答基于科学证据，不构成医疗建议。回答中标注 [来源: xxx] 的内容来自知识库，[待验证] 的内容需人工核实。学术引用请以原始文献为准。');

  // 加载状态
  function setLoading(on){
    sendBtn.disabled=on;
    sendBtn.textContent=on?'思考中…':'发送';
    inputEl.disabled=on;
  }

  // 发送逻辑
  function doSend(){
    var text=inputEl.value.trim();
    if(!text)return;
    inputEl.value='';
    addMsg('user',text);
    conversationHistory.push({role:'user',content:text});
    setLoading(true);

    // 使用流式接口
    if(typeof callAIStream==='function'){
      var group=addStreamingMsg();
      var msgEl=group.querySelector('.msg');
      var bubble=group.querySelector('.bubble');
      var fullText='';
      var firstToken=true;

      currentStreamCtrl=callAIStream(
        text,
        {topic:'general',page:'ai-assistant'},
        conversationHistory,
        // onToken
        function(token){
          if(firstToken){
            firstToken=false;
            setMsgStatus(group,'generating','生成中');
          }
          fullText+=token;
          renderMarkdown(bubble,fullText);
          msgsEl.scrollTop=msgsEl.scrollHeight;
        },
        // onSkill
        function(skills){
          if(skills&&skills.length){
            setMsgStatus(group,'skill','引用技能：'+skills[0]);
          }
        },
        // onDone
        function(){
          setMsgStatus(group,null);
          conversationHistory.push({role:'assistant',content:fullText});
          if(conversationHistory.length>MAX_HISTORY) conversationHistory=conversationHistory.slice(-MAX_HISTORY);
          setLoading(false);
          currentStreamCtrl=null;
          inputEl.focus();
        },
        // onError — 流式失败时回退到非流式
        function(e){
          group.remove();
          currentStreamCtrl=null;
          if(e.message.includes('无法连接到 AI 服务')||e.message.includes('Failed to fetch')||e.message.includes('NetworkError')){
            // 连接失败：回退到非流式
            doSendFallback(text);
          }else{
            addMsg('system',e.message);
            setLoading(false);
            inputEl.focus();
          }
        }
      );
    }else{
      // 回退到非流式
      doSendFallback(text);
    }
  }

  // 非流式回退
  async function doSendFallback(text){
    try{
      var reply=await callAI(text,{topic:'general',page:'ai-assistant'},conversationHistory);
      addMsg('assistant',reply);
      conversationHistory.push({role:'assistant',content:reply});
      if(conversationHistory.length>MAX_HISTORY) conversationHistory=conversationHistory.slice(-MAX_HISTORY);
    }catch(e){
      addMsg('system',e.message);
    }finally{
      setLoading(false);
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click',doSend);
  inputEl.addEventListener('keydown',function(e){if(e.key==='Enter')doSend()});
  inputEl.focus();

  // 清空对话历史
  clearBtn.addEventListener('click',function(){
    if(currentStreamCtrl){currentStreamCtrl.abort();currentStreamCtrl=null;}
    conversationHistory=[];
    msgsEl.innerHTML='';
    addMsg('assistant','你好，我是默存。名字取自"默而存之"——我沉在数据与生命的深处，不喧哗，只回应。\n\n你可以点击下方快捷问题，或直接输入任何科学问题，我会认真对待。');
    addMsg('system','提示：AI 回答基于科学证据，不构成医疗建议。回答中标注 [来源: xxx] 的内容来自知识库，[待验证] 的内容需人工核实。学术引用请以原始文献为准。');
  });

  // 快捷问题按钮
  document.querySelectorAll('.quick-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var q=btn.getAttribute('data-q');
      if(q){inputEl.value=q;doSend();}
    });
  });
})();
</script>

</body>
</html>
